<!DOCTYPE html>
<html lang="en" data-site-root="..">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My profile – KTrain</title>
  <link rel="stylesheet" href="../styles-light.css" />
  <link rel="stylesheet" href="../styles-dashboard.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="../" class="brand"><div class="brand-mark"></div><span>KTrain</span></a>
      <nav class="main-nav">
        <ul>
          <li><a href="../">Home</a></li>
          <li><a href="../dashboard/">My portal</a></li>
          <li><a href="../meq/">MEQ Course</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="profile-page shell">
    <h1 class="profile-page-title">My profile</h1>

    <section class="profile-section">
      <h2 class="profile-section-title">Your course</h2>
      <div id="profileEnrollments" class="profile-enrollments">
        <p class="profile-enroll-empty">Loading…</p>
      </div>
    </section>

    <section class="profile-section">
      <h2 class="profile-section-title">Personal details</h2>
      <p class="profile-hint">Update the name and contact details stored on your account. Your email is managed through your login and cannot be changed here.</p>
      <form class="profile-form" id="profileForm">
        <div class="profile-form-row">
          <label for="full_name">Full name</label>
          <input type="text" id="full_name" name="full_name" required autocomplete="name" />
        </div>
        <div class="profile-form-row profile-form-row--readonly">
          <span class="profile-label">Email</span>
          <span id="profileEmail" class="profile-readonly-value">—</span>
        </div>
        <div class="profile-form-row">
          <label for="phone">Phone number</label>
          <input type="tel" id="phone" name="phone" autocomplete="tel" />
        </div>
        <div class="profile-form-row">
          <label for="college_id">College ID</label>
          <input type="text" id="college_id" name="college_id" />
        </div>
        <div class="profile-form-row profile-form-row--readonly">
          <span class="profile-label">Exam date</span>
          <span id="profileExamReadonly" class="profile-readonly-value">—</span>
        </div>
        <div id="profileError" class="profile-message profile-message--error" role="alert"></div>
        <div id="profileSaved" class="profile-message profile-message--ok" role="status"></div>
        <button type="submit" class="btn">Save changes</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <span class="footer-brand">KTrain</span>
      <ul class="footer-links">
        <li><a href="../">Home</a></li>
        <li><a href="../dashboard/">My portal</a></li>
        <li class="footer-course-admin"><a href="../course-admin/">Course admin</a></li>
      </ul>
      <div class="footer-account-row">
        <button type="button" id="profileFooterLogout" class="footer-logout-btn">Log out</button>
      </div>
    </div>
  </footer>

  <script src="../js/site-paths.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
