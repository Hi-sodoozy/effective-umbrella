<!DOCTYPE html>
<html lang="en" data-site-root="..">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Staff sign in – My Psych Training</title>
  <link rel="stylesheet" href="../styles-light.css" />
  <style>
    .auth-page { max-width: 400px; margin: 4rem auto; padding: 0 1.5rem; }
    .auth-page h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .auth-form .form-row { margin-bottom: 1rem; }
    .auth-form label { display: block; font-weight: 600; margin-bottom: 0.35rem; }
    .auth-form input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: 1rem; }
    .auth-form .btn { width: 100%; margin-top: 0.5rem; }
    .auth-form .error { color: #c53030; font-size: 0.9rem; margin-top: 0.5rem; }
    .auth-form .link { margin-top: 1rem; text-align: center; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="../" class="brand"><div class="brand-mark"></div><span>My Psych Training</span></a>
      <nav class="main-nav"><ul><li><a href="../login/">Student log in</a></li></ul></nav>
    </div>
  </header>

  <main class="auth-page">
    <div id="gatePanel">
      <h1>Access</h1>
      <p style="color: var(--ink-muted); font-size: 0.95rem; margin-bottom: 1rem;">Enter the site access code to continue.</p>
      <form class="auth-form" id="gateForm">
        <div class="form-row">
          <label for="gatePassword">Access code</label>
          <input type="password" id="gatePassword" name="gatePassword" required autocomplete="off" />
        </div>
        <div id="gateError" class="error" role="alert"></div>
        <button type="submit" class="btn">Continue</button>
      </form>
    </div>

    <div id="signinPanel" hidden>
      <h1>Admin sign in</h1>
      <form class="auth-form" id="adminLoginForm">
        <div class="form-row">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-row">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>
        <div id="loginError" class="error" role="alert"></div>
        <button type="submit" class="btn">Log in</button>
      </form>
      <p class="link"><a href="../login/">Student log in</a></p>
    </div>
  </main>

  <script src="../js/site-paths.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    (function () {
      var STORAGE_KEY = 'ktrain_admin_gate_ok';
      var SITE_CODE = 'Erval20';

      var gatePanel = document.getElementById('gatePanel');
      var signinPanel = document.getElementById('signinPanel');

      function showSignin() {
        gatePanel.hidden = true;
        signinPanel.hidden = false;
      }

      if (sessionStorage.getItem(STORAGE_KEY) === '1') {
        showSignin();
      }

      document.getElementById('gateForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var err = document.getElementById('gateError');
        err.textContent = '';
        var v = document.getElementById('gatePassword').value;
        if (v === SITE_CODE) {
          sessionStorage.setItem(STORAGE_KEY, '1');
          showSignin();
        } else {
          err.textContent = 'That code is not valid.';
        }
      });

      document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        if (sessionStorage.getItem(STORAGE_KEY) !== '1') {
          gatePanel.hidden = false;
          signinPanel.hidden = true;
          return;
        }
        var err = document.getElementById('loginError');
        err.textContent = '';
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        var adminUrl = typeof window.ktrainPaths !== 'undefined' ? window.ktrainPaths.admin() : '../admin/';
        try {
          if (!window.ktrainAuth) throw new Error('Supabase not configured.');
          await window.ktrainAuth.signIn(email, password);
          window.location.href = adminUrl;
        } catch (x) {
          err.textContent = x.message || 'Log in failed.';
        }
      });
    })();
  </script>
</body>
</html>
